<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2a2d3e" />
            <stop offset="100%" stop-color="#14151f" />
        </linearGradient>
        <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#36D1DC" />
            <stop offset="100%" stop-color="#5B86E5" />
        </linearGradient>
    </defs>
    <rect width="512" height="512" rx="120" fill="url(#bg)" />
    
    <!-- Top ellipse (DB cylinder) -->
    <ellipse cx="256" cy="160" rx="140" ry="50" fill="none" stroke="url(#primary)" stroke-width="36" />
    
    <!-- Sides of cylinder -->
    <path d="M116 160 v192 c0 27.6 62.68 50 140 50 s140-22.4 140-50 v-192" fill="none" stroke="url(#primary)" stroke-width="36" />
    
    <!-- Middle connector -->
    <path d="M256 210 L256 340" stroke="#fff" fill="none" stroke-width="28" stroke-linecap="round" />
    <ellipse cx="256" cy="360" rx="15" ry="10" fill="#fff" />
</svg>
